<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Viewer</title>

<script>
const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){
    window.location.href = "pdfjs/viewer.html?file=" + encodeURIComponent(file);
}
</script>

</head>
<body>
Loading PDF...
</body>
</html>
